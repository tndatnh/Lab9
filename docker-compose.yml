# docker-compose.yml - Selenium Grid 4 với Docker
# Lưu ý: Không có dòng 'version:' để tránh warning

services:
  # === HUB: Trung tâm điều phối ===
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4442:4442"  # Event bus
      - "4443:4443"  # Event bus
      - "4444:4444"  # Grid UI + WebDriver endpoint
    environment:
      - GRID_TIMEOUT=300
      - GRID_BROWSER_TIMEOUT=300

  # === CHROME NODE 1 ===
  chrome-node-1:
    image: selenium/node-chrome:4.18.1
    container_name: chrome-node-1
    shm_size: 2gb  # ⚠️ BẮT BUỘC: Chrome cần shared memory lớn
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_SESSION_TIMEOUT=300
      - NODE_MAX_INSTANCES=3
      - NODE_MAX_SESSION=3

  # === CHROME NODE 2 ===
  chrome-node-2:
    image: selenium/node-chrome:4.18.1
    container_name: chrome-node-2
    shm_size: 2gb  # ⚠️ BẮT BUỘC
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_SESSION_TIMEOUT=300
      - NODE_MAX_INSTANCES=3
      - NODE_MAX_SESSION=3

  # === FIREFOX NODE ===
  firefox-node:
    image: selenium/node-firefox:4.18.1
    container_name: firefox-node
    shm_size: 2gb  # ⚠️ BẮT BUỘC
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_SESSION_TIMEOUT=300
      - NODE_MAX_INSTANCES=2
      - NODE_MAX_SESSION=2
